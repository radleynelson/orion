name: OrionMobile
options:
  bundleIdPrefix: com.orion
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.13.0

targets:
  OrionMobile:
    type: application
    platform: iOS
    sources:
      - OrionMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orion.mobile
        INFOPLIST_FILE: OrionMobile/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        CODE_SIGN_ENTITLEMENTS: OrionMobile/OrionMobile.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
